  - id: 3
    name: "RBAC 权限系统开发"
    tool: "nestjs-cli"
    auto: true
    estimated_hours: 10
  - id: 4
    name: "核心业务模块开发"
    tool: "nestjs-cli"
    auto: true
    estimated_hours: 16
  - id: 5
